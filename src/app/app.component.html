<ion-app>
  <!-- Menú lateral - Original -->
  <ion-menu contentId="main-content" type="overlay">
    <ion-header class="ion-no-border">
      <ion-toolbar color="primary">
        <ion-title style="color: black;">Menú Principal</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding" style="--background: #000;">
      <ion-list lines="full" style="background: transparent;">
        <ion-menu-toggle auto-hide="false">
          <ion-item button routerLink="/home" routerDirection="root" style="--background: transparent; --color: white;">
            <ion-icon slot="start" name="home-outline" color="primary"></ion-icon>
            <ion-label>Inicio</ion-label>
            <ion-icon slot="end" name="chevron-forward-outline" color="medium"></ion-icon>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item button routerLink="/personal-info" routerDirection="root" style="--background: transparent; --color: white;">
            <ion-icon slot="start" name="person-outline" color="primary"></ion-icon>
            <ion-label>Información Personal</ion-label>
            <ion-icon slot="end" name="chevron-forward-outline" color="medium"></ion-icon>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item button routerLink="/contact" routerDirection="root" style="--background: transparent; --color: white;">
            <ion-icon slot="start" name="mail-outline" color="primary"></ion-icon>
            <ion-label>Contacto</ion-label>
            <ion-icon slot="end" name="chevron-forward-outline" color="medium"></ion-icon>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
