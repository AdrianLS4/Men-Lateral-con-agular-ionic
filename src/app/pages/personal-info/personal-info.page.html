<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button color="dark"></ion-menu-button>
    </ion-buttons>
    <ion-title style="color: black; font-weight: 700;">Información Personal</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #0b0b0b;">
  <div class="profile-header" style="text-align: center; padding: 40px 20px;">
    <div class="avatar-circle" style="width: 150px; height: 150px; background: #ccff00; border-radius: 50%; margin: 0 auto; display: flex; justify-content: center; align-items: center;">
      <ion-icon name="person" style="font-size: 100px; color: white;"></ion-icon>
    </div>
  </div>

  <div class="info-card" style="background: #121212; margin: 0 20px; border-radius: 20px; padding: 24px; border: 1px solid #333;">
    <h1 style="color: white; margin: 0; font-size: 28px; font-weight: 800;">{{ user.name }}</h1>
    <span style="color: #666; font-size: 12px; font-weight: 700;">{{ user.role }}</span>
    
    <div style="margin-top: 20px;">
      <p style="color: white; font-weight: 600;">Carrera: <span style="font-weight: 400; color: #aaa;">{{ user.career }}</span></p>
      <p style="color: #888; font-style: italic; line-height: 1.4; margin-top: 10px;">"{{ user.bio }}"</p>
    </div>
  </div>

  <div class="skills-section" style="margin: 30px 20px;">
    <div style="background: #000; padding: 20px; border-radius: 0;">
      <h3 style="color: white; margin-top: 0;">Mis Conocimientos</h3>
      <ion-list lines="full" style="background: transparent;">
        <ion-item *ngFor="let s of user.specialties" style="--background: transparent; --color: white; --padding-start: 0;">
          <ion-label style="font-size: 14px;">{{ s }}</ion-label>
        </ion-item>
      </ion-list>
    </div>
  </div>
</ion-content>
