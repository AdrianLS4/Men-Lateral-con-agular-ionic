<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button color="dark"></ion-menu-button>
    </ion-buttons>
    <ion-title style="color: black;">Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" style="--background: #0b0b0b;">
  <div class="contact-header" style="text-align: center; margin-top: 20px;">
    <ion-icon name="mail-open-outline" color="primary" style="font-size: 48px;"></ion-icon>
    <h1 style="color: white; font-weight: 800; font-size: 32px;">¡Hablemos!</h1>
    <p style="color: #666; font-size: 14px;">Si tienes alguna duda o sugerencia, envíame un mensaje.</p>
  </div>

  <div class="form-section" style="margin-top: 30px;">
    <ion-item class="custom-item">
      <ion-label position="stacked" style="color: #666;">Nombre Completo</ion-label>
      <ion-input placeholder="Ingresa tu nombre"></ion-input>
    </ion-item>

    <ion-item class="custom-item">
      <ion-label position="stacked" style="color: #666;">Correo Electrónico</ion-label>
      <ion-input type="email" placeholder="ejemplo@correo.com"></ion-input>
    </ion-item>

    <ion-item class="custom-item">
      <ion-label position="stacked" style="color: #666;">Mensaje</ion-label>
      <ion-textarea rows="5" placeholder="Escribe tu mensaje aquí..."></ion-textarea>
    </ion-item>

    <ion-button expand="block" color="primary" style="margin-top: 30px; --border-radius: 30px; height: 50px; color: black; font-weight: 700;">
      Enviar Mensaje
    </ion-button>
  </div>

  <div class="info-footer" style="margin-top: 40px; border-top: 1px solid #333; padding-top: 20px;">
    <ion-item lines="none" style="--background: #000; --border-radius: 10px; margin-bottom: 10px;">
      <ion-icon name="logo-whatsapp" slot="start" color="primary"></ion-icon>
      <ion-label style="color: white;">+584142031090</ion-label>
    </ion-item>
    <ion-item lines="none" style="--background: #000; --border-radius: 10px;">
      <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
      <ion-label style="color: white; font-size: 14px;">4badriansandoval@gmail.com</ion-label>
    </ion-item>
  </div>
</ion-content>
